<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5a623" id="theme-color-meta" />
    <meta name="description" content="מערכת המחסן הדיגיטלי — מכללת קמרה אובסקורה וסאונד" />

    <!-- iOS PWA support: enables standalone install, status bar styling, and home-screen title -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="קמרה סאונד" />
    <!-- Legacy fallback for older Android browsers -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Windows tile color -->
    <meta name="msapplication-TileColor" content="#f5a623" />

    <title>קמרה סאונד APP</title>
    <link rel="icon" type="image/png" href="/LOGON1.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/LOGON1.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Detect Supabase password-recovery URL BEFORE any module (including
      // the Supabase client) loads. In PWA mode the app is launched with a
      // pre-existing session in localStorage, which otherwise fires SIGNED_IN
      // first and routes the user into the portal — clobbering the #recovery
      // fragment before PASSWORD_RECOVERY can fire. We wipe any stored
      // Supabase auth token so the recovery token in the URL becomes the
      // only active session when createClient() runs.
      (function () {
        try {
          var hash = window.location.hash || "";
          var search = window.location.search || "";
          var isRecovery =
            hash.indexOf("type=recovery") !== -1 ||
            search.indexOf("type=recovery") !== -1 ||
            search.indexOf("reset=1") !== -1;
          if (isRecovery) {
            window.__isPasswordRecovery = true;
            for (var i = localStorage.length - 1; i >= 0; i--) {
              var key = localStorage.key(i);
              if (
                key &&
                key.indexOf("sb-") === 0 &&
                key.indexOf("-auth-token") !== -1
              ) {
                localStorage.removeItem(key);
              }
            }
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
